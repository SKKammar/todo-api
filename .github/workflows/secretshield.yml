name: SecretShield Scan
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  repository_dispatch:
    types: [secretshield-scan]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run SecretShield
        uses: SKKammar/secretshield@v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
